name: Astro Stream Scraper

on:
  schedule:
    - cron: '0 */12 * * *' # Runs automatically every 12 hours
  workflow_dispatch: # Gives you the manual button to run it whenever you want

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Modules
      run: pip install requests beautifulsoup4 googlesearch-python

    - name: Search Open Web For Astro Channels
      run: python scraper.py

    - name: Save Discovered Links To Your Repo
      run: |
        git config --global user.name "GitHub Action Bot"
        git config --global user.email "actions@github.com"
        git add discovered_links.txt || true
        git commit -m "Updated Astro live stream links" || exit 0
        git push
