name: Astro Stream Scraper

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Modules
      run: pip install requests

    - name: Run Script
      run: python scraper.py

    - name: Save Discovered Links
      run: |
        git config --global user.name "GitHub Action Bot"
        git config --global user.email "actions@github.com"
        git add discovered_links.txt || true
        git commit -m "Updated Astro live stream links" || exit 0
        git push
